      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: manipulation;
    }

    body {
      position: fixed;
      inset: 0;
      padding: var(--safe-top) var(--safe-right) var(--safe-bottom) var(--safe-left);
    }

    #app {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: #000;
      cursor: pointer;
    }

    #iconLayer {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .status-icon {
      width: var(--icon-size);
      height: var(--icon-size);
      opacity: 0;
      transform: scale(0.88);
      pointer-events: none;
      will-change: opacity, transform;
      animation: icon-pop 760ms ease-out both;
    }

    #hint {
      position: fixed;
      left: 24px;
      right: 24px;
      bottom: calc(24px + var(--safe-bottom));
      opacity: 0.45;
      font-size: 14px;
      line-height: 1.35;
      text-align: center;
      pointer-events: none;
      transition: opacity 240ms ease;
    }

    #hint.hidden {
      opacity: 0;
    }

    @keyframes icon-pop {
      0% {
        opacity: 0;
        transform: scale(0.86);
      }
      22% {
        opacity: 1;
        transform: scale(1.04);
      }
      62% {
        opacity: 1;
        transform: scale(1);
      }
      100% {
        opacity: 0;
        transform: scale(1.08);
      }
    }
  </style>
</head>

    for (let i = 0; i < output.length; i += 1) {
      output[i] = this.nextSample();

        masterGainNode.connect(mediaStreamDestinationNode);
        buildOutputAudioElement();
      } else {
        masterGainNode.connect(audioContext.destination);
      }

      audioContext.addEventListener('statechange', () => {
        if (started && !muted && document.visibilityState === 'visible') {
          recoverAudio();
        }
      });
    }

    async function ensureMediaElementPlayback() {
      const mediaPromises = [];

      if (outputAudio && outputAudio.paused) {
        mediaPromises.push(outputAudio.play());
      }

      // Fallback for browsers where the MediaStream output path is not available.
      // The helper is intentionally not used when outputAudio exists, so the tiny
      // WAV tone cannot add extra colour to the main sleep noise.
      if (!outputAudio && shouldUseMediaUnlock()) {
        if (!unlockAudio) {
          buildUnlockAudio();
        }

        if (unlockAudio.paused) {
          mediaPromises.push(unlockAudio.play());
        }
      }

      await Promise.allSettled(mediaPromises);
    }

    async function startAudioFromUserGesture() {
      if (!audioContext) {
        await buildAudioGraph();
        setupMediaSession();
      }

      // The noise node now runs continuously. Unlike AudioBufferSourceNode,
      // it does not need start(), so there is no short loop to reveal itself.
      if (!started) {
        started = true;
      }

      const resumePromise = audioContext.state !== 'running'
        ? audioContext.resume()
        : Promise.resolve();

      const mediaPromise = ensureMediaElementPlayback();

      await Promise.allSettled([resumePromise, mediaPromise]);

      muted = false;
      fadeTo(DEFAULT_VOLUME, 0.22);
      updateMediaSessionState();
      hint.classList.add('hidden');
    }

    function fadeTo(value, duration) {
      if (!audioContext || !masterGainNode) return;

      const now = audioContext.currentTime;
      const currentValue = masterGainNode.gain.value;

      masterGainNode.gain.cancelScheduledValues(now);
      masterGainNode.gain.setValueAtTime(currentValue, now);
      masterGainNode.gain.linearRampToValueAtTime(value, now + duration);
    }

    function setMuted(nextMuted) {
      muted = nextMuted;
      fadeTo(muted ? 0 : DEFAULT_VOLUME, 0.14);
      updateMediaSessionState();
    }

    function updateMediaSessionState() {
      if ('mediaSession' in navigator) {
        navigator.mediaSession.playbackState = started && !muted ? 'playing' : 'paused';
      }
    }

    function setupMediaSession() {
      if (!('mediaSession' in navigator)) return;

      if ('MediaMetadata' in window) {
        navigator.mediaSession.metadata = new MediaMetadata({
          title: 'Sleep',
          artist: 'Noise',
          album: 'Best Sleep Songs 2026',
          artwork: [
            { src: COVER_ART_512, sizes: '512x512', type: 'image/png' }
          ]
        });
      }

      try {
        navigator.mediaSession.setActionHandler('play', async () => {
          await recoverAudio();
          setMuted(false);
          showIcon(soundSvg);
        });
      } catch (error) {
        // Some iOS versions expose Media Session only partially.
      }

      try {
        navigator.mediaSession.setActionHandler('pause', () => {
          setMuted(true);
          showIcon(muteSvg);
        });
      } catch (error) {
        // Some iOS versions expose Media Session only partially.
      }

      updateMediaSessionState();
    }

    async function recoverAudio() {
      if (!started || muted || !audioContext) return;

      try {
        await ensureMediaElementPlayback();

        if (audioContext.state !== 'running') {
          await audioContext.resume();
        }

        fadeTo(DEFAULT_VOLUME, 0.08);
        updateMediaSessionState();
      } catch (error) {
        // Recovery is best-effort. iOS may require a fresh tap after interruption.
      }
    }

    function showIcon(svg) {
      const nextIcon = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      nextIcon.setAttribute('class', 'status-icon');
      nextIcon.setAttribute('viewBox', '0 0 96 96');
      nextIcon.innerHTML = svg;

      iconLayer.replaceChildren(nextIcon);

      nextIcon.addEventListener('animationend', () => {
        nextIcon.remove();
      }, { once: true });
    }

    async function handleTap(event) {
      event.preventDefault();

      // Avoid double toggles when iOS sends both touch and mouse/click-style events.
      const now = Date.now();
      if (now - lastTapTime < 300) return;
      lastTapTime = now;

      try {
        if (!started) {
          await startAudioFromUserGesture();
          showIcon(soundSvg);
          return;
        }

        await ensureMediaElementPlayback();

        if (audioContext && audioContext.state !== 'running') {
          await audioContext.resume();
        }

        setMuted(!muted);
        showIcon(muted ? muteSvg : soundSvg);
      } catch (error) {
        hint.textContent = 'Tap again to allow sound';
        hint.classList.remove('hidden');
      }
    }

    document.addEventListener('visibilitychange', () => {
      if (!started || muted) return;

      if (document.visibilityState === 'visible') {
        recoverAudio();
      } else {
        // Best-effort: keep the media element alive before iOS freezes JS.
        ensureMediaElementPlayback();
      }
    });

    window.addEventListener('pageshow', recoverAudio);
    window.addEventListener('focus', recoverAudio);

    // Use touchend first for old iOS Safari. Pointer events cover newer Safari and desktop.
    app.addEventListener('touchend', handleTap, { passive: false });
    app.addEventListener('pointerup', handleTap);
  </script>
</body>
</html>
